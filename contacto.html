<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Rincón Artesanal — Contacto</title>
    <meta name="description" content="Suscríbete a nuestro boletín y recibe novedades de El Rincón Artesanal.">
    <link rel="icon" type="image/png" href="icons/icon.png">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="section" style="padding-top: calc(var(--header-height) + 3rem);">
            <div class="container">
                <div class="contact-section">
                    <p class="section__overline">Mantente Inspirado</p>
                    <h2 class="section__title">Recibe nuestras novedades</h2>
                    <p class="section__subtitle">Nuevas piezas, talleres artesanales e historias del barro, directo a tu correo.</p>
                    <form class="contact-form" id="newsletterForm">
                        <input type="email" placeholder="tu@correo.com" required>
                        <button type="submit" class="btn btn--primary">Suscribirme</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar" aria-label="Carrito de compras">
        <div class="cart-sidebar__header">
            <span>Tu Cesta</span>
            <button class="cart-sidebar__close" id="cartClose" aria-label="Cerrar carrito">✕</button>
        </div>
        <div class="cart-sidebar__items" id="cartItems"></div>
        <div class="cart-sidebar__footer" id="cartFooter" style="display:none;">
            <div class="cart-sidebar__total"><span>Total</span><span id="cartTotal">€0,00</span></div>
            <button class="cart-sidebar__checkout" id="cartCheckout">Finalizar Pedido</button>
        </div>
    </aside>
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/javascript.js" defer></script>
</body>
</html>
